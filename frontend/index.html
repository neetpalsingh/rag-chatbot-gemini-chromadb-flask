<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Chatbot - Gemini & ChromaDB</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>🤖 RAG Chatbot</h1>
            <p class="subtitle">Powered by Gemini & ChromaDB</p>
        </header>

        <div class="main-content">
            <div class="upload-section card">
                <h2>📄 Upload Document</h2>
                <div class="upload-area" id="uploadArea">
                    <input type="file" id="fileInput" accept=".pdf,.txt" hidden>
                    <div class="upload-content">
                        <span class="upload-icon">📁</span>
                        <p>Click to upload or drag and drop</p>
                        <p class="upload-hint">PDF or TXT files (max 10MB)</p>
                    </div>
                </div>
                <div id="uploadStatus" class="upload-status"></div>
                <div class="stats">
                    <span id="statsText">Total chunks: <strong>0</strong></span>
                </div>
            </div>

            <div class="chat-section card">
                <h2>💬 Chat</h2>
                <div class="chat-container" id="chatContainer">
                    <div class="welcome-message">
                        <p>👋 Welcome! Upload a document to start chatting.</p>
                    </div>
                </div>
                <div class="chat-input-container">
                    <input 
                        type="text" 
                        id="chatInput" 
                        placeholder="Ask a question about your documents..." 
                        autocomplete="off"
                    >
                    <button id="sendBtn" class="send-btn">Send</button>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>
    <div id="loader" class="loader hidden">
        <div class="spinner"></div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
